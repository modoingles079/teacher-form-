<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Application</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f4f4f4;
    font-family: 'Inter', sans-serif;
    color: #111;
    min-height: 100vh;
    padding: 40px 16px 80px;
    font-size: 16px;
  }

  .container { max-width: 500px; margin: 0 auto; }

  .field {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 10px;
  }

  .field-label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #111;
    margin-bottom: 12px;
  }

  .field-label .req { color: #e8921f; font-weight: 400; margin-left: 3px; font-size: 14px; }

  input[type="text"],
  input[type="tel"],
  select {
    width: 100%;
    padding: 13px 15px;
    border: 1.5px solid #e4e4e4;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: #111;
    background: #fafafa;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus { border-color: #111; background: #fff; }
  input::placeholder { color: #c4c4c4; font-weight: 300; }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾'; position: absolute; right: 15px; top: 50%;
    transform: translateY(-50%); color: #aaa; pointer-events: none; font-size: 13px;
  }

  /* Time slot grid */
  .slots-section-label {
    font-size: 12px;
    font-weight: 500;
    color: #aaa;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 16px 0 8px;
  }

  .slots-section-label:first-of-type { margin-top: 0; }

  .slot-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 4px;
  }

  .slot-grid input[type="checkbox"] { display: none; }

  .slot-grid label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 8px;
    border: 1.5px solid #e4e4e4;
    border-radius: 9px;
    cursor: pointer;
    text-align: center;
    background: #fafafa;
    transition: all 0.14s;
    user-select: none;
    margin: 0;
  }

  .slot-grid label .t {
    font-size: 13px;
    font-weight: 500;
    color: #111;
    line-height: 1.3;
  }

  .slot-grid label .sub {
    font-size: 10px;
    color: #bbb;
    font-weight: 300;
    margin-top: 2px;
  }

  .slot-grid input:checked + label {
    border-color: #111;
    background: #111;
  }

  .slot-grid input:checked + label .t { color: #fff; }
  .slot-grid input:checked + label .sub { color: #777; }

  /* Modality */
  .mod-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .mod-group input { display: none; }
  .mod-group label {
    display: flex; align-items: center; justify-content: center;
    padding: 13px 8px; border: 1.5px solid #e4e4e4; border-radius: 9px;
    cursor: pointer; text-align: center; font-size: 13px; font-weight: 400;
    color: #555; background: #fafafa; transition: all 0.14s; user-select: none; margin: 0;
  }
  .mod-group input:checked + label { border-color: #111; background: #111; color: #fff; }

  .hint { font-size: 11px; color: #bbb; font-weight: 300; margin-top: 10px; }

  /* Submit */
  .submit-btn {
    width: 100%; padding: 17px; background: #111; color: #fff;
    border: none; border-radius: 12px; font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s; letter-spacing: 0.01em;
  }
  .submit-btn:hover { opacity: 0.82; }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .submit-btn .btn-loading { display: none; }
  .submit-btn.loading .btn-text { display: none; }
  .submit-btn.loading .btn-loading { display: inline; }

  .error-msg {
    background: #fff5f5; border: 1px solid #ffd4d4; color: #c00;
    border-radius: 8px; padding: 12px 16px; font-size: 13px;
    margin-top: 10px; display: none;
  }
  .error-msg.visible { display: block; }

  /* Success */
  .success-screen { display: none; text-align: center; padding: 80px 20px; }
  .success-screen.visible { display: block; }
  .form-wrap.hidden { display: none; }

  .check {
    width: 54px; height: 54px; border-radius: 50%; background: #111; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin: 0 auto 18px;
  }
  .success-screen h2 { font-size: 1.3rem; font-weight: 500; margin-bottom: 8px; }
  .success-screen p { color: #999; font-size: 14px; font-weight: 300; }

  @media (max-width: 380px) {
    .slot-grid { grid-template-columns: repeat(2, 1fr); }
    .mod-group { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="form-wrap" id="formWrap">

    <!-- Full name -->
    <div class="field">
      <label class="field-label">Full name <span class="req">*</span></label>
      <input type="text" id="name" placeholder="Your full name">
    </div>

    <!-- Nationality -->
    <div class="field">
      <label class="field-label">Nationality <span class="req">*</span></label>
      <input type="text" id="nationality" placeholder="e.g. American, British, Colombian…">
    </div>

    <!-- City -->
    <div class="field">
      <label class="field-label">City in Colombia <span class="req">*</span></label>
      <div class="select-wrap">
        <select id="city">
          <option value="" disabled selected>Select your city…</option>
          <option>Bogotá</option>
          <option>Medellín</option>
          <option>Cali</option>
          <option>Cartagena</option>
          <option>Barranquilla</option>
          <option>Santa Marta</option>
          <option>Bucaramanga</option>
          <option>Pereira</option>
          <option>Manizales</option>
          <option>Other</option>
        </select>
      </div>
    </div>

    <!-- WhatsApp -->
    <div class="field">
      <label class="field-label">WhatsApp number <span class="req">*</span></label>
      <input type="tel" id="whatsapp" placeholder="+57 300 000 0000">
    </div>


    <!-- Email -->
    <div class="field">
      <label class="field-label">Email address <span class="req">*</span></label>
      <input type="text" id="email" placeholder="you@email.com">
    </div>

    <!-- Experience -->
    <div class="field">
      <label class="field-label">Years of teaching experience <span class="req">*</span></label>
      <div class="select-wrap">
        <select id="experience">
          <option value="" disabled selected>Select…</option>
          <option>Less than 1 year</option>
          <option>1–2 years</option>
          <option>3–5 years</option>
          <option>6–10 years</option>
          <option>10+ years</option>
        </select>
      </div>
    </div>

    <!-- Time slots -->
    <div class="field">
      <label class="field-label">Available time slots <span class="req">*</span></label>

      <div class="slots-section-label">Morning</div>
      <div class="slot-grid">
        <input type="checkbox" id="s1" value="6:00–7:00 am">
        <label for="s1"><span class="t">6–7 am</span><span class="sub">Morning</span></label>

        <input type="checkbox" id="s2" value="7:00–8:00 am">
        <label for="s2"><span class="t">7–8 am</span><span class="sub">Morning</span></label>

        <input type="checkbox" id="s3" value="8:00–9:00 am">
        <label for="s3"><span class="t">8–9 am</span><span class="sub">Morning</span></label>
      </div>

      <div class="slots-section-label">Evening</div>
      <div class="slot-grid">
        <input type="checkbox" id="s4" value="4:00–5:00 pm">
        <label for="s4"><span class="t">4–5 pm</span><span class="sub">Evening</span></label>

        <input type="checkbox" id="s5" value="5:00–6:00 pm">
        <label for="s5"><span class="t">5–6 pm</span><span class="sub">Evening</span></label>

        <input type="checkbox" id="s6" value="6:00–7:00 pm">
        <label for="s6"><span class="t">6–7 pm</span><span class="sub">Evening</span></label>

        <input type="checkbox" id="s7" value="7:00–8:00 pm">
        <label for="s7"><span class="t">7–8 pm</span><span class="sub">Evening</span></label>
      </div>
      <div class="hint">Colombia time (COL)</div>
    </div>

    <!-- Modality -->
    <div class="field">
      <label class="field-label">Teaching modality <span class="req">*</span></label>
      <div class="mod-group">
        <input type="radio" name="modality" id="mod-online" value="Online only">
        <label for="mod-online">Online only</label>

        <input type="radio" name="modality" id="mod-inperson" value="In-person only">
        <label for="mod-inperson">In-person only</label>

        <input type="radio" name="modality" id="mod-both" value="Both">
        <label for="mod-both">Both</label>
      </div>
      <div class="hint">Classes run live on Zoom · Max 5 students per group</div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
      <span class="btn-text">Submit application</span>
      <span class="btn-loading">Sending…</span>
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Success -->
  <div class="success-screen" id="successScreen">
    <div class="check">✓</div>
    <h2>Thank you!</h2>
    <p>We'll be in touch via WhatsApp within 48 hours.</p>
  </div>
</div>

<script>
  // ↓ Replace YOUR_FORM_ID with your Formspree ID (e.g. xpwzabcd)
  const FORMSPREE = 'https://formspree.io/f/xpqybjvg';

  async function handleSubmit() {
    const name        = document.getElementById('name').value.trim();
    const nationality = document.getElementById('nationality').value.trim();
    const city        = document.getElementById('city').value;
    const whatsapp    = document.getElementById('whatsapp').value.trim();
    const experience  = document.getElementById('experience').value;
    const email       = document.getElementById('email').value.trim();
    const modality    = document.querySelector('input[name="modality"]:checked')?.value || '';
    const slots       = [...document.querySelectorAll('input[type="checkbox"]:checked')].map(c => c.value);

    const err = document.getElementById('errorMsg');
    err.classList.remove('visible');

    if (!name || !nationality || !city || !whatsapp || !email || !experience || !modality || slots.length === 0) {
      err.textContent = 'Please complete all fields before submitting.';
      err.classList.add('visible');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch(FORMSPREE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          'Project':     'Teacher Recruitment',
          'Full Name':   name,
          'Nationality': nationality,
          'City':        city,
          'WhatsApp':    whatsapp,
          'Email':       email,
          'Experience':  experience,
          'Time Slots':  slots.join(', '),
          'Modality':    modality,
        }),
      });

      if (res.ok) {
        document.getElementById('formWrap').classList.add('hidden');
        document.getElementById('successScreen').classList.add('visible');
      } else {
        throw new Error();
      }
    } catch {
      err.textContent = 'Something went wrong. Please try again.';
      err.classList.add('visible');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
